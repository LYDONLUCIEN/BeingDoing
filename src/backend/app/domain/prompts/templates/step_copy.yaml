name: step_copy
description: 各阶段开始/结束时的引导文案（前端展示用，非 LLM 提示词）

# 编辑说明：
# - intro: 用户进入该阶段时展示的欢迎/引导文案
# - outro: 用户完成该阶段（结论卡确认后）展示的总结/过渡文案
# - 支持 Markdown 格式
# - 留空则不展示

values:
  intro: |
    欢迎开始第一轮探索——**价值观发现**。
    我们将通过对话，帮你找到对职业发展最重要的 5 个价值观关键词。
  outro: |
    恭喜你完成了价值观探索！接下来我们将进入优势发现，帮你识别你的核心能力。

strengths:
  intro: |
    欢迎进入第二轮探索——**优势发现**。
    我们将一起挖掘你最突出的 5 个优势，并为每个优势做标记。
  outro: |
    优势探索完成！下一轮我们将探索你的热爱领域。

interests:
  intro: |
    欢迎进入第三轮探索——**热爱发现**。
    我们将帮你找到 3 个你真正感兴趣、充满好奇的领域。
  outro: |
    热爱探索完成！下一轮我们将探索你的工作使命。

purpose:
  intro: |
    欢迎进入第四轮探索——**使命发现**。
    我们将帮你发现你最希望为他人提供的核心价值。
  outro: |
    使命探索完成！最后一轮我们将综合所有发现，帮你确定职业方向。

rumination:
  intro: |
    恭喜你进入最后一轮——**沉淀与选择**。
    我们将综合你的价值观、优势、热爱和使命，帮你确定三个可以尝试的职业方向。
  outro: |
    恭喜你完成了全部探索！你的专属职业规划报告即将生成。
