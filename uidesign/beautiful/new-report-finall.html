<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四维共鸣 - 获取报告</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", STHeiti, sans-serif;
  }

  body {
    background: radial-gradient(circle at 15% 30%, #dcf0e8, transparent 50%),
                radial-gradient(circle at 85% 20%, #fde8ed, transparent 50%),
                radial-gradient(circle at 50% 90%, #fde2b4, transparent 60%),
                linear-gradient(135deg, #cbe2f4 0%, #e6f0e4 30%, #fce2e8 70%, #fcf0db 100%);
    background-attachment: fixed;
    overflow-x: hidden;
    color: #2c333a;
  }

  .page-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* ── 卡片区 ── */
  .hero-section {
    width: 100%;
    padding-top: 80px;
    position: relative;
    z-index: 2;
  }

  .cards-wrapper {
    display: flex;
    gap: 24px;
    width: 100%;
  }

  .card {
    flex: 1;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.8);
    border-radius: 20px;
    padding: 32px 24px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.02);
    position: relative;
    overflow: hidden;
    transition: transform 0.4s cubic-bezier(0.165,0.84,0.44,1);
  }
  .card:hover { transform: translateY(-8px); }
  .card::before {
    content: ''; position: absolute;
    top: 0; left: 0; width: 100%; height: 4px;
  }
  .card-blue::before   { background: linear-gradient(90deg,#7bb5fb,#a8cbf3); }
  .card-green::before  { background: linear-gradient(90deg,#83e0c3,#a2e8c6); }
  .card-pink::before   { background: linear-gradient(90deg,#fc8d98,#fca5a5); }
  .card-yellow::before { background: linear-gradient(90deg,#fbca5b,#fde047); }

  .step-text  { font-size:13px; color:#8892a0; margin-bottom:12px; font-weight:500; }
  .card-title { font-size:20px; font-weight:600; margin-bottom:16px; }
  .card-blue .card-title   { color:#5a8bc9; }
  .card-green .card-title  { color:#4da98a; }
  .card-pink .card-title   { color:#d9626e; }
  .card-yellow .card-title { color:#d09a25; }
  .card-desc { font-size:14px; color:#606972; line-height:1.6; }

  /* =========================================
     连接区域
     =========================================
     共享变量：
     --r        圆角半径 (px)
     --seg      弧线路径总长度参考（dasharray）
     --duration 单次呼吸周期
  */
  .connection-zone {
    --r: 12;           /* 圆角大小，单位px，对应SVG内的数值 */
    --seg: 30;         /* 发光段长度(px)，短而克制 */
    --gap: 999;        /* 间隔足够大，保证只有一段光 */
    --duration: 3.6s;  /* 呼吸周期，快频 */
    --delay-final: 2.8s; /* 白光延迟，比拐角晚一点 */

    width: 100%;
    height: 260px;
    position: relative;
    z-index: 1;
  }

  /* SVG 画布：覆盖整个连接区 */
  .arc-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    overflow: visible;
  }

  /*
    路径样式：
    stroke-dasharray  = 发光段长度 + 超大间隔
    stroke-dashoffset = 动画起点（从路径之外开始）
    opacity 渐显渐隐营造呼吸感
  */
  .arc-path {
    fill: none;
    stroke: white;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-dasharray: var(--seg) var(--gap);
    stroke-dashoffset: 60;   /* 起始在路径外，进入时渐显 */
    opacity: 0;
    /* filter 叠加两层：内层锐利 + 外层柔散，纯白荧光感 */
    filter:
      drop-shadow(0 0 3px rgba(255,255,255,1))
      drop-shadow(0 0 8px rgba(255,255,255,0.7));
    animation-name: breath-arc;
    animation-duration: var(--duration);
    animation-timing-function: ease-in-out;
    animation-iteration-count: infinite;
  }

  @keyframes breath-arc {
    0%   { stroke-dashoffset: 55;  opacity: 0;   }
    20%  { opacity: 1; }
    50%  { opacity: 1; }
    80%  { opacity: 0; }
    100% { stroke-dashoffset: -25; opacity: 0;   }
  }

  /* 最终白光：居中垂直向下，比拐角晚出现 */
  .v-final {
    position: absolute;
    left: 50%;
    top: 150px;
    transform: translateX(-50%);
    width: 2px;
    height: 60px;
    border-radius: 4px;
    background: linear-gradient(to bottom,
      transparent 0%,
      rgba(255,255,255,0.95) 40%,
      rgba(255,255,255,0.95) 60%,
      transparent 100%);
    filter:
      drop-shadow(0 0 3px rgba(255,255,255,1))
      drop-shadow(0 0 10px rgba(255,255,255,0.6));
    opacity: 0;
    animation: fall-final var(--duration) ease-in-out var(--delay-final) infinite;
  }

  @keyframes fall-final {
    0%   { transform: translateX(-50%) translateY(0);    opacity: 0; }
    20%  { opacity: 1; }
    60%  { opacity: 1; }
    85%  { opacity: 0; }
    100% { transform: translateX(-50%) translateY(60px); opacity: 0; }
  }

  /* =========================================
     结果卡片
     ========================================= */
  .report-section {
    width: 100%;
    max-width: 800px;
    margin-bottom: 120px;
    position: relative;
    z-index: 10;
  }

  .report-glass-card {
    padding: 60px 40px;
    border-radius: 32px;
    background: rgba(255,255,255,0.4);
    backdrop-filter: blur(24px) saturate(150%);
    -webkit-backdrop-filter: blur(24px) saturate(150%);
    border: 1px solid rgba(255,255,255,0.6);
    box-shadow: 0 30px 60px rgba(0,0,0,0.03), inset 0 1px 0 rgba(255,255,255,1);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .report-title {
    font-size: 26px; font-weight: 600; letter-spacing: 1px;
    margin-bottom: 24px; color: #1a1d20;
  }
  .report-subtitle {
    font-size: 15px; color: #5a626a; line-height: 1.8;
    margin-bottom: 40px; max-width: 500px;
  }

  .btn-start {
    display: inline-flex; align-items: center;
    background: rgba(255,255,255,0.85); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,1); padding: 6px 6px 6px 32px;
    border-radius: 50px; font-size: 16px; font-weight: 600;
    color: #2c333a; text-decoration: none; cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.03); transition: all 0.3s ease;
  }
  .btn-start:hover {
    background: #ffffff;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    transform: translateY(-2px);
  }
  .btn-icon-core {
    width: 36px; height: 36px; margin-left: 20px; border-radius: 50%;
    background: conic-gradient(from 180deg at 50% 50%,#7bb5fb,#83e0c3,#fc8d98,#fbca5b,#7bb5fb);
    display: flex; justify-content: center; align-items: center;
    color: white; font-size: 16px;
    box-shadow: inset 0 2px 4px rgba(255,255,255,0.4);
    transition: transform 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  .btn-start:hover .btn-icon-core { transform: rotate(90deg) scale(1.05); }
</style>
</head>
<body>

<div class="page-wrapper">

  <section class="hero-section">
    <div class="cards-wrapper">
      <div class="card card-blue">
        <div class="step-text">第一步</div>
        <div class="card-title">明确你的价值观</div>
        <div class="card-desc">找出对你最重要的核心价值观，建立评估未来选择的正确标准。</div>
      </div>
      <div class="card card-green">
        <div class="step-text">第二步</div>
        <div class="card-title">发现你的优势</div>
        <div class="card-desc">揭示你独特的天赋和自然擅长的事情，看到让你有价值的独特优势。</div>
      </div>
      <div class="card card-pink">
        <div class="step-text">第三步</div>
        <div class="card-title">找到你的心流</div>
        <div class="card-desc">探索能给你带来活力的活动和话题，找到能维持长期动力的热情。</div>
      </div>
      <div class="card card-yellow">
        <div class="step-text">第四步</div>
        <div class="card-title">定义你的使命</div>
        <div class="card-desc">将未来的工作与更大的使命联系起来，明确你期望创造的社会价值。</div>
      </div>
    </div>
  </section>

  <!--
    连接区域：SVG 用 JS 在运行时按卡片实际中心位置绘制路径
    这样无论屏幕宽窄，四个拐角永远精准对齐卡片中心
  -->
  <div class="connection-zone" id="connectionZone">
    <svg class="arc-svg" id="arcSvg">
      <!-- 路径由JS动态生成，保证像素级精准 -->
    </svg>
    <div class="v-final"></div>
  </div>

  <section class="report-section">
    <div class="report-glass-card">
      <h2 class="report-title">获取「四维共鸣」专属报告</h2>
      <p class="report-subtitle">
        基于你的信念、禀赋、热忱与使命，<br>
        为你深度推演高度匹配的职业方向。
      </p>
      <a class="btn-start">
        你的方向
        <div class="btn-icon-core">→</div>
      </a>
    </div>
  </section>

</div>

<script>
  /*
    运行时计算各卡片中心的 X 坐标，
    让 SVG 路径精准地从卡片底部中心出发，
    画出 r=12px 的圆角拐向页面中心。
  */
  function buildArcs() {
    const zone   = document.getElementById('connectionZone');
    const svg    = document.getElementById('arcSvg');
    const cards  = document.querySelectorAll('.card');
    const vFinal = document.querySelector('.v-final');

    if (cards.length < 4) return;

    const zoneRect = zone.getBoundingClientRect();
    const r = 8;        // 圆角半径，与CSS --r 保持一致
    const arcH = 60;     // 拐角的垂直高度（从顶部到拐点）
    const centerX = zoneRect.width / 2;  // 页面中心X（相对zone）

    svg.innerHTML = '';  // 清空旧路径

    cards.forEach((card, i) => {
      const cardRect = card.getBoundingClientRect();
      // 卡片底部中心，相对于 zone 的坐标
      const cx = cardRect.left + cardRect.width / 2 - zoneRect.left;
      const startY = 30;
      const turnY  = arcH;  // 拐点高度

      let d = '';

      if (cx < centerX) {
        // 左侧卡片：从上向下，向右拐（顺时针弧 sweep-flag=1）
        // 垂直段：(cx, startY) → (cx, turnY - r)
        // 圆弧：从 (cx, turnY-r) 弯到 (cx+r, turnY)，半径r
        // 水平段：向右延伸一小截
        const endX = Math.min(cx + 50, centerX - 10); // 不超过中心
        d = `M ${cx} ${startY} L ${cx} ${turnY - r} A ${r} ${r} 0 0 0 ${cx + r} ${turnY} L ${endX} ${turnY}`;
      } else {
        // 右侧卡片：从上向下，向左拐（逆时针弧 sweep-flag=0）
        const endX = Math.max(cx - 50, centerX + 10);
        d = `M ${cx} ${startY} L ${cx} ${turnY - r} A ${r} ${r} 0 0 1 ${cx - r} ${turnY} L ${endX} ${turnY}`;
      }

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', d);
      path.classList.add('arc-path');

      // 四个拐角稍微错开时间，形成"依次呼吸"的节奏感
      const delays = [0, 0.15, 0.15, 0];
      path.style.animationDelay = `${delays[i]}s`;

      svg.appendChild(path);
    });

    // 白光的 top 对齐拐点底部
    //vFinal.style.top = `${arcH + 60}px`;
  }

  // 初始化 + 响应窗口大小变化
  buildArcs();
  window.addEventListener('resize', buildArcs);
</script>

</body>
</html>
