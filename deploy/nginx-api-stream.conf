# Nginx 配置：API 反代（含流式 /message/stream）
# 用法：在 server 块中 include 此片段，或复制到对应 location
#
# 502 常见原因：后端未启动、超时过短、未关闭缓冲导致流式响应异常
# 流式接口需要：proxy_buffering off、较长 proxy_read_timeout

location ^~ /api/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $server_name;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # 流式接口必须关闭缓冲，否则可能导致 502 或响应卡住
    proxy_buffering off;
    proxy_cache off;
    proxy_request_buffering off;

    # 超时：LLM 流式生成可能较慢，建议 300s 以上
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 60s;

    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
}
