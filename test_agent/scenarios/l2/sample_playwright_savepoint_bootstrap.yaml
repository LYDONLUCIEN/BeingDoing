schema_version: 1
id: l2_pw_savepoint_bootstrap
title: Savepoint load + Playwright smoke
primary_level: L2
support_levels: [L3]
engine: playwright
data:
  # 前端地址（页面交互）
  base_url: http://127.0.0.1:3000
  # 后端地址（用于自动调用 admin/savepoints/load）
  backend_url: http://127.0.0.1:8000
  # 以下 2 个字段用于“先加载检查点，再进入页面”
  activation_code: "DBG123456"
  savepoint_id: "sp_example_001"
  # 若不配置 savepoint_id，可直接使用 activation_code + thread_id 进入指定线程
  # thread_id: "t_rum_chat_001"
  phase: rumination
steps:
  - action: goto
    url: /explore/chat/rumination
  - action: wait_ms
    ms: 1200
  - action: chat_send
    text: "确认，可以继续"
  - action: wait_for_ai
    delta: 1
  - action: screenshot
    name: savepoint_after_send.png
assertions:
  expected_keywords: ["确认", "继续"]
  no_leak_tags: ["[STATE_JSON]", "[ROW_STATE_JSON]"]
